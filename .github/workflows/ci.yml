name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.4.0"
      - name: Ruff lint
        run: ruff check src tests

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install typing deps
        run: pip install "mypy>=1.9.0" "types-PyYAML" "pydantic>=2.6.0"
      - name: Run mypy on src/
        run: mypy src --ignore-missing-imports --exclude "src/glue_jobs/"

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install bandit
        run: pip install "bandit[toml]>=1.7.8"
      - name: Bandit scan (high severity only)
        run: bandit -c pyproject.toml -r src -lll -x src/glue_jobs,tests

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

  test-info:
    name: "Tests: run locally (make test)"
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Unit + integration tests run locally via 'make test'."
          echo "See docs/LOCAL_DEVELOPMENT.md for setup instructions."
